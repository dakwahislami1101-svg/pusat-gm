<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pusat Game - Banyak Pilihan</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pusat Game" />
    <link rel="apple-touch-icon" href="/icon-512.jpg" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- PWA Service Worker Registration & Dev Sandbox Auto-Cleanup -->
    <script>
      const isDevSandbox = 
        window.location.hostname === 'localhost' || 
        window.location.hostname === '127.0.0.1' || 
        window.location.hostname.includes('ais-dev-') || 
        window.location.hostname.includes('ais-pre-') ||
        window.location.hostname.includes('run.app');

      if (isDevSandbox) {
        console.log('[PWA] Dev Sandbox detected. Cleaning up service workers & caches to avoid blank screens...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().then((success) => {
                if (success) {
                  console.log('[PWA] Unregistered service worker successfully');
                  window.location.reload();
                }
              });
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then((names) => {
            for (let name of names) {
              caches.delete(name).then(() => {
                console.log('[PWA] Deleted cache:', name);
              });
            }
          });
        }
      } else {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then((registration) => {
                console.log('[PWA] Registered Service Worker scope:', registration.scope);
              })
              .catch((error) => {
                console.error('[PWA] Service Worker Registration failed:', error);
              });
          });
        }
      }
    </script>
  </body>
</html>
