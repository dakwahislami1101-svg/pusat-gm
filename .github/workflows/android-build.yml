name: Build Android APK and AAB

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Memungkinkan build manual dari tab Actions di GitHub

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository Anda
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Setup Java JDK (Wajib untuk kompilasi Android)
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instal dependensi npm
      - name: Install Dependencies
        run: |
          npm ci || npm install

      # 6. Build aplikasi React frontend ke folder dist
      - name: Build Web Application
        run: |
          npm run build
        env:
          NODE_ENV: production

      # 7. Integrasi Capacitor (Membungkus Web App ke Native Android)
      # Jika Capacitor belum di-init di lokal, langkah ini akan meng-init secara otomatis
      - name: Initialize & Sync Capacitor
        run: |
          # Install @capacitor/core dan @capacitor/cli jika belum ada
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev
          
          # Cek apakah file capacitor.config.json atau capacitor.config.ts sudah ada
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo "Membuat konfigurasi Capacitor otomatis..."
            npx cap init "Pusat Game" "com.pusatgame.pwa" --web-dir=dist
          fi
          
          # Tambahkan platform Android jika belum ada
          if [ ! -d "android" ]; then
            echo "Menambahkan platform Android..."
            npx cap add android
          fi

          # Update Version Name dan Version Code secara dinamis di build.gradle agar bisa diupdate langsung di Google Play Store
          if [ -f "android/app/build.gradle" ]; then
            echo "Mengupdate versi aplikasi di android/app/build.gradle ke 1.1.0 (versionCode 2)..."
            # Ganti versionCode default (1) dengan 2
            sed -i 's/versionCode 1/versionCode 2/g' android/app/build.gradle
            # Ganti versionName default ("1.0") dengan "1.1.0"
            sed -i 's/versionName "1.0"/versionName "1.1.0"/g' android/app/build.gradle
          fi
          
          # Sync assets web ke folder Android
          npx cap sync android

          # Solusi untuk mengatasi konflik perulangan "Duplicate class kotlin.jdk7.AutoCloseableKt" dll.
          echo "Menonaktifkan kotlin-stdlib-jdk7 & jdk8 yang duplikat..."
          cat << 'EOF' >> android/build.gradle

          allprojects {
              configurations.all {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF

          cat << 'EOF' >> android/app/build.gradle

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

      # 8. Konfigurasi Gradle & Izin Eksekusi di Android Project
      - name: Grant Execute Permission for Gradle
        run: |
          cd android
          chmod +x gradlew

      # 9. Build Debug APK (Untuk pengetesan langsung di HP)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 10. Build Release APK & AAB (Untuk di-upload ke Play Store)
      - name: Build Release APK and AAB
        run: |
          cd android
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # 11. Otomatisasi tanda tangan (Signing) APK dan AAB
      - name: Sign Release APK & AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android-signing
          
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Menggunakan Keystore khusus dari GitHub Secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > android-signing/release.keystore
            KS_FILE="android-signing/release.keystore"
            KS_PASS="$KEYSTORE_PASSWORD"
            KS_ALIAS="$KEY_ALIAS"
            K_PASS="$KEY_PASSWORD"
          else
            echo "GitHub Secrets kosong. Membuat signature/keystore dinamis otomatis..."
            KS_FILE="android-signing/auto-release.keystore"
            KS_PASS="pusatgame123"
            KS_ALIAS="pusatgame"
            K_PASS="pusatgame123"
            
            keytool -genkey -v \
              -keystore "$KS_FILE" \
              -alias "$KS_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass "$K_PASS" \
              -dname "CN=Pusat Game, OU=Dev, O=PusatGame, L=Jakarta, S=DKI, C=ID"
          fi

          echo "Menandatangani APK dengan apksigner..."
          # Temukan alat apksigner yang paling update di Android SDK
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort | tail -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner tidak ditemukan, menggunakan command fallback..."
            APKSIGNER="apksigner"
          fi
          
          $APKSIGNER sign \
            --ks "$KS_FILE" \
            --ks-key-alias "$KS_ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$K_PASS" \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            "$(find android/app/build/outputs/apk/release -name "*.apk" ! -name "*-signed.apk" | head -n 1)"

          echo "Menandatangani AAB dengan jarsigner..."
          jarsigner -keystore "$KS_FILE" \
            -storepass "$KS_PASS" \
            -keypass "$K_PASS" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            "$(find android/app/build/outputs/bundle/release -name "*.aab" ! -name "*-signed.aab" | head -n 1)" \
            "$KS_ALIAS"
          
          echo "Verifikasi APK berhasil ditandatangani..."
          $APKSIGNER verify android/app/build/outputs/apk/release/app-release-signed.apk

      # 12. Upload file Debug APK sebagai Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # 13. Upload file Signed Release APK sebagai Artifact
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 7

      # 14. Upload file Signed Release AAB (Android App Bundle untuk Google Play Store)
      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 7
